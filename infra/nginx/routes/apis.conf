location = /api/user {
    return 301 /api/user/;
}

location /api/user/ {
    proxy_pass http://userapi:8080/;
}

location = /api/accounts {
    return 301 /api/accounts/;
}

location /api/accounts/ {
    proxy_pass http://accountsapi:8080/;
}

location = /api/file {
    return 301 /api/file/;
}

location /api/file/ {
    proxy_pass http://fileapi:8080/;
}

location = /api/project {
    return 301 /api/project/;
}

location = /api/project/ {
    return 302 $scheme://$http_host/api/project/swagger/index.html;
}

location /api/project/ {
    proxy_pass http://projectapi:8080/;
}

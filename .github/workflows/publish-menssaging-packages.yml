name: Publish Common Menssaging Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "NuGet package version to publish"
        required: true
        type: string
  release:
    types:
      - published
  push:
    branches:
      - main
    tags:
      - "menssaging-v*"

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "8.0.x"
  SOLUTION_PATH: "common/Menssaging/Menssaging.sln"
  NUGET_SOURCE_URL: "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

jobs:
  publish:
    name: Pack and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#menssaging-v}"
            VERSION="${VERSION#v}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            VERSION="0.0.0-main.${GITHUB_RUN_NUMBER}"
          else
            VERSION="${{ inputs.version }}"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Package version is required." >&2
            exit 1
          fi

          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Restore solution
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Build solution
        run: dotnet build "${{ env.SOLUTION_PATH }}" --configuration Release --no-restore

      - name: Pack solution
        run: |
          dotnet pack "${{ env.SOLUTION_PATH }}" \
            --configuration Release \
            --no-build \
            --output "${{ github.workspace }}/artifacts" \
            /p:PackageVersion=${{ steps.version.outputs.value }}

      - name: Publish packages to GitHub Packages
        run: |
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg" \
            --source "${{ env.NUGET_SOURCE_URL }}" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate
